name: AI Mission

description: CEO intent translated into structured AI work

title: "[AI Mission] "

labels:
  - ai-mission
  - mission-control

body:
  - type: markdown
    attributes:
      value: |
        Use this template to turn CEO intent into structured AI work.

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What should be achieved?
      placeholder: "Example: Build a Codex remote-control workflow through GitHub Issues."
    validations:
      required: true

  - type: textarea
    id: business_context
    attributes:
      label: Business Context
      description: Why does this matter?
    validations:
      required: true

  - type: textarea
    id: success_criteria
    attributes:
      label: Success Criteria
      description: How will we know this is done well?
    validations:
      required: true

  - type: textarea
    id: in_scope
    attributes:
      label: In Scope
      description: What is included in this mission?

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      description: What should the agent avoid doing?

  - type: textarea
    id: acceptance_tests
    attributes:
      label: Acceptance Tests
      description: How should the result be verified?

  - type: dropdown
    id: risk_level
    attributes:
      label: Risk Level
      options:
        - "1 - local/reversible"
        - "2 - local artifact/doc"
        - "3 - external write or PR"
        - "4 - production/cost/credential"
        - "5 - destructive/legal/security"
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: What must be avoided or protected?
      placeholder: "Avoid forcing the CEO to use GitHub manually."

  - type: dropdown
    id: target_agent
    attributes:
      label: Target Agent
      options:
        - CTO / ChatGPT
        - Codex
        - Claude Code
        - Research Agent
        - Design Agent
        - Undecided
    validations:
      required: true

  - type: checkboxes
    id: leverage_scan
    attributes:
      label: Leverage Scan Required
      options:
        - label: Evaluate latest relevant MCP servers
        - label: Evaluate libraries / SDKs / APIs
        - label: Evaluate multimodal opportunities
        - label: Evaluate dashboard / visualization opportunities
        - label: Evaluate automation / orchestration opportunities
        - label: Evaluate harness / evaluation methods

  - type: dropdown
    id: approval_level
    attributes:
      label: Approval Level
      options:
        - No CEO approval needed after task definition
        - CEO approval needed before implementation
        - CEO approval needed before merge/release
        - CEO approval needed for strategic decision only
    validations:
      required: true

  - type: textarea
    id: expected_output
    attributes:
      label: Expected Output
      description: What should the agent produce?
      placeholder: "Commit, PR, research summary, design, prototype, dashboard, etc."
    validations:
      required: true

  - type: checkboxes
    id: memory_update
    attributes:
      label: Memory Update
      options:
        - label: This mission should update brain/feedback
        - label: This mission should update brain/memory
        - label: This mission should update rules or playbooks
        - label: This mission should update architecture or governance proposals
