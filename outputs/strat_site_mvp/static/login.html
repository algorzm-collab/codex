<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>strategy Admin Login</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .login-box { width: min(440px, 100%); background: white; border: 1px solid var(--line); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); }
    .login-box h1 { font-size: 32px; margin-bottom: 12px; }
    .login-box p { color: var(--muted); line-height: 1.6; }
  </style>
</head>
<body>
  <main class="login-box">
    <p class="kicker">Admin</p>
    <h1>strategy 관리자 로그인</h1>
    <p>기본 MVP 비밀번호는 서버 환경변수 `STRAT_ADMIN_PASSWORD`로 바꾸는 것을 권장합니다.</p>
    <form class="form" id="loginForm">
      <input name="password" type="password" placeholder="관리자 비밀번호" required autofocus>
      <button class="btn primary" type="submit">로그인</button>
      <p class="form-note" id="loginNote"></p>
    </form>
  </main>
  <script>
    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const password = event.currentTarget.elements.password.value;
      const response = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password })
      });
      const body = await response.json();
      if (body.ok) {
        location.href = "/admin";
      } else {
        document.getElementById("loginNote").textContent = body.error || "로그인 실패";
      }
    });
  </script>
</body>
</html>
