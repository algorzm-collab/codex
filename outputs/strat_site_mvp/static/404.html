<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>STRATEGY | 페이지를 찾을 수 없습니다</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #15171a;
      color: #f7f8f5;
      font-family: Pretendard, "Noto Sans KR", Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(720px, 100%);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 8px;
      padding: clamp(28px, 6vw, 56px);
      background: linear-gradient(135deg, rgba(255,255,255,.08), transparent 42%);
    }
    p { color: rgba(255,255,255,.68); line-height: 1.7; }
    h1 { margin: 0 0 14px; font-size: clamp(34px, 6vw, 64px); line-height: 1.05; letter-spacing: 0; }
    a {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      margin-top: 18px;
      border-radius: 8px;
      padding: 0 16px;
      background: #0f766e;
      color: white;
      text-decoration: none;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main>
    <p>STRATEGY</p>
    <h1>요청한 페이지를 찾을 수 없습니다.</h1>
    <p>문제 진단, 대표 실적, 문의 경로는 메인 페이지에서 바로 이어갈 수 있습니다.</p>
    <a href="/">홈으로 돌아가기</a>
  </main>
</body>
</html>
