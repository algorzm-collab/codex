<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>strategy Admin</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { background: #f7f8f5; }
    .admin-wrap { max-width: 1280px; margin: 0 auto; padding: 40px 24px; }
    .admin-grid { display: grid; grid-template-columns: 420px 1fr; gap: 22px; align-items: start; }
    .admin-panel { background: white; border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; }
    .admin-panel h2 { font-size: 24px; margin-bottom: 14px; }
    .admin-panel h3 { margin: 24px 0 10px; }
    .admin-list { display: grid; gap: 10px; max-height: 520px; overflow: auto; }
    .record { border: 1px solid var(--line); border-radius: 6px; padding: 12px; background: #fbfcfa; }
    .record b { display: block; margin-bottom: 4px; }
    .record p { margin: 4px 0; color: var(--muted); font-size: 13px; line-height: 1.5; }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .tabs button { border: 1px solid var(--line); background: white; border-radius: 999px; padding: 8px 10px; cursor: pointer; }
    .tabs button.active { border-color: var(--teal); background: var(--teal-soft); font-weight: 800; }
    @media (max-width: 980px) { .admin-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/"><span>ST</span> strategy Admin</a>
    <nav><a href="/">홈페이지</a></nav>
    <div class="actions" style="margin:0">
      <button class="btn secondary" id="logoutBtn">로그아웃</button>
      <button class="btn primary" id="reloadBtn">새로고침</button>
    </div>
  </header>
  <main class="admin-wrap">
    <div class="section-head">
      <p class="kicker">Admin Console</p>
      <h1>실적과 핵심장표를 직접 업데이트하고 기록을 확인합니다.</h1>
      <p>현재 MVP는 로컬 SQLite에 저장됩니다. 운영 배포 시 관리자 인증을 반드시 추가해야 합니다.</p>
    </div>

    <div class="admin-grid">
      <section class="admin-panel">
        <h2>실적 업데이트</h2>
        <form class="form" id="caseForm">
          <input name="id" placeholder="수정할 ID, 신규는 비움">
          <input name="title" placeholder="실적 제목" required>
          <input name="customer_type" placeholder="고객 유형" required>
          <textarea name="problem" placeholder="고객 문제" required></textarea>
          <textarea name="approach" placeholder="STRAT 접근" required></textarea>
          <textarea name="deliverables" placeholder="주요 산출물" required></textarea>
          <input name="solution_cluster" placeholder="솔루션 클러스터" required>
          <input name="display_order" type="number" placeholder="정렬 순서" value="100">
          <label class="check"><input name="is_published" type="checkbox" checked> 공개</label>
          <button class="btn primary" type="submit">실적 저장</button>
          <p class="form-note" id="caseNote"></p>
        </form>

        <h2>핵심장표 업데이트</h2>
        <form class="form" id="slideForm">
          <input name="id" placeholder="수정할 ID, 신규는 비움">
          <input name="title" placeholder="장표 제목" required>
          <textarea name="summary" placeholder="장표 설명" required></textarea>
          <input name="image_url" placeholder="이미지 URL 또는 경로">
          <input name="link_url" placeholder="자료 링크 URL">
          <input name="display_order" type="number" placeholder="정렬 순서" value="100">
          <label class="check"><input name="is_published" type="checkbox" checked> 공개</label>
          <button class="btn primary" type="submit">장표 저장</button>
          <p class="form-note" id="slideNote"></p>
        </form>

        <h2>전체 실적 업데이트</h2>
        <form class="form" id="projectForm">
          <input name="id" placeholder="수정할 ID, 신규는 비움">
          <input name="theme" placeholder="테마 예: Strategy 전략수립" required>
          <input name="sector" placeholder="산업 예: Infrastructure" required>
          <input name="client" placeholder="고객명" required>
          <textarea name="project_title" placeholder="프로젝트명" required></textarea>
          <input name="year_note" placeholder="연도/메모 예: 2023, 2024">
          <input name="display_order" type="number" placeholder="정렬 순서" value="100">
          <label class="check"><input name="is_published" type="checkbox" checked> 공개</label>
          <button class="btn primary" type="submit">전체 실적 저장</button>
          <p class="form-note" id="projectNote"></p>
        </form>
      </section>

      <section class="admin-panel">
        <div class="tabs" id="tabs">
          <button data-tab="cases" class="active">실적</button>
          <button data-tab="slides">장표</button>
          <button data-tab="users">회원</button>
          <button data-tab="mailing">메일링</button>
          <button data-tab="project_records">전체 실적</button>
          <button data-tab="issues">설문/추론기록</button>
          <button data-tab="events">이벤트</button>
          <button data-tab="inquiries">문의</button>
          <button data-tab="qa">QA</button>
        </div>
        <div class="admin-list" id="records"></div>
      </section>
    </div>
  </main>
  <script src="/admin.js?v=20260701-sprint03"></script>
</body>
</html>
